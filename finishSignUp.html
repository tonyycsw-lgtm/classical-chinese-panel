<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入驗證中 · 文言文學習平台</title>
  <base href="/classical-chinese-panel/">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #f3f4f6 0%, #e5e7eb 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .verify-card {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      border-radius: 48px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
    }
    .icon { font-size: 48px; color: #4f46e5; background: white; width: 80px; height: 80px; border-radius: 30px; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
    h2 { font-size: 24px; color: #1f2937; margin-bottom: 12px; }
    p { color: #6b7280; margin-bottom: 24px; }
    .spinner { border: 3px solid #f3f4f6; border-top: 3px solid #4f46e5; border-radius: 50%; width: 48px; height: 48px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .message { padding: 16px; border-radius: 40px; margin: 20px 0; display: none; }
    .message.success { background: #dcfce7; color: #059669; display: block; }
    .message.error { background: #fee2e2; color: #dc2626; display: block; }
    .btn { background: #4f46e5; color: white; border: none; padding: 14px 32px; border-radius: 40px; font-size: 16px; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="verify-card">
    <div class="icon"><i class="fas fa-scroll"></i></div>
    <h2>處理登入請求</h2>
    <p>請稍候，我們正在驗證你的登入連結</p>
    <div class="spinner" id="spinner"></div>
    <div class="message" id="message"></div>
    <a href="/classical-chinese-panel/login.html" class="btn" id="backBtn" style="display: none;">返回登入頁</a>
  </div>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, isSignInWithEmailLink, signInWithEmailLink } from "firebase/auth";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, increment } from "firebase/firestore";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT.firebasestorage.app",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    async function handleEmailLink() {
      if (!isSignInWithEmailLink(auth, window.location.href)) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('message').className = 'message error';
        document.getElementById('message').textContent = '無效的登入連結';
        document.getElementById('backBtn').style.display = 'inline-block';
        return;
      }

      let email = window.localStorage.getItem('emailForSignIn');
      if (!email) {
        email = prompt('請輸入您的 Email 以完成登入');
        if (!email) {
          document.getElementById('spinner').style.display = 'none';
          document.getElementById('message').className = 'message error';
          document.getElementById('message').textContent = '登入已取消';
          document.getElementById('backBtn').style.display = 'inline-block';
          return;
        }
      }

      try {
        const result = await signInWithEmailLink(auth, email, window.location.href);
        window.localStorage.removeItem('emailForSignIn');
        
        // 處理用戶資料
        const user = result.user;
        const userRef = doc(db, 'users', user.uid);
        const userSnap = await getDoc(userRef);
        const now = new Date().toISOString();
        
        if (!userSnap.exists()) {
          const trialEndDate = new Date();
          trialEndDate.setDate(trialEndDate.getDate() + 7);
          await setDoc(userRef, {
            email: user.email,
            displayName: user.email.split('@')[0],
            photoURL: null,
            phoneNumber: '',
            role: 'user',
            premium: false,
            plan: 'free',
            trialEndAt: trialEndDate.toISOString(),
            loginCount: 1,
            readingProgress: {},
            createdAt: now,
            lastLoginAt: now,
            updatedAt: now
          });
        } else {
          await updateDoc(userRef, {
            lastLoginAt: now,
            loginCount: increment(1),
            updatedAt: now
          });
        }

        document.getElementById('spinner').style.display = 'none';
        document.getElementById('message').className = 'message success';
        document.getElementById('message').textContent = '✅ 登入成功！即將跳轉...';
        setTimeout(() => {
          window.location.href = '/classical-chinese-panel/index.html';
        }, 2000);
      } catch (error) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('message').className = 'message error';
        document.getElementById('message').textContent = '登入失敗：' + error.message;
        document.getElementById('backBtn').style.display = 'inline-block';
      }
    }

    handleEmailLink();
  </script>
</body>
</html>
